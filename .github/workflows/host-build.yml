name: Host CLI builds

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  posix:
    strategy:
      matrix:
        include:
          - os: macos-14
            artifact: xpad2-ionstack-reroot-darwin-arm64
          - os: ubuntu-24.04
            artifact: xpad2-ionstack-reroot-linux-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Build host controller
        run: cc -O2 -std=c11 -Wall -Wextra -Werror src/host/ionstack_reroot.c -o "${{ matrix.artifact }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  windows:
    runs-on: windows-2022
    env:
      LLVM_MINGW_VERSION: "20260407"
    steps:
      - uses: actions/checkout@v4
      - name: Install LLVM-MinGW
        shell: pwsh
        run: |
          $archive = "$env:RUNNER_TEMP\llvm-mingw.zip"
          $uri = "https://github.com/mstorsjo/llvm-mingw/releases/download/$env:LLVM_MINGW_VERSION/llvm-mingw-$env:LLVM_MINGW_VERSION-ucrt-x86_64.zip"
          Invoke-WebRequest $uri -OutFile $archive
          Expand-Archive $archive "$env:RUNNER_TEMP\llvm-mingw"
          $bin = Get-ChildItem "$env:RUNNER_TEMP\llvm-mingw" -Filter x86_64-w64-mingw32-clang.exe -Recurse | Select-Object -First 1 -ExpandProperty DirectoryName
          "LLVM_MINGW_BIN=$bin" >> $env:GITHUB_ENV
      - name: Build host controller
        shell: pwsh
        run: |
          & "$env:LLVM_MINGW_BIN\x86_64-w64-mingw32-clang.exe" -O2 -std=c11 -Wall -Wextra -Werror src/host/ionstack_reroot.c -o xpad2-ionstack-reroot-windows-x86_64.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - uses: actions/upload-artifact@v4
        with:
          name: xpad2-ionstack-reroot-windows-x86_64
          path: xpad2-ionstack-reroot-windows-x86_64.exe
